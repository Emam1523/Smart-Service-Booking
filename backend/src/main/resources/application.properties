spring.application.name=Smart Service Booking

#PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/smart-service-booking
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=username
spring.datasource.password=password

# JPA / Hibernate 
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Server 
server.port=8080

#  JWT 
jwt.secret=SmartServiceBookingSecretKey2026SuperSecureTokenSigningKeyMustBe256BitsLong!!
jwt.expiration=86400000

#  CORS 
cors.allowed-origins=http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000,http://localhost:5501,http://127.0.0.1:5501

#  File Upload 
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

