<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Bookings - SmartService Admin</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo"><div class="icon">SS</div><span>SmartService</span></div>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><i class="fas fa-chart-line"></i><span>Dashboard</span></a>
            <a href="users.html" class="nav-item"><i class="fas fa-users"></i><span>Users</span></a>
            <a href="providers.html" class="nav-item"><i class="fas fa-user-tie"></i><span>Providers</span></a>
            <a href="bookings.html" class="nav-item active"><i class="fas fa-calendar"></i><span>Bookings</span></a>
            <a href="reviews.html" class="nav-item"><i class="fas fa-star"></i><span>Reviews</span></a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="avatar" id="userAvatar">A</div>
                <div class="user-details"><span class="name" id="userName">Admin</span><span class="role">Administrator</span></div>
            </div>
            <button class="btn btn-sm btn-danger" onclick="Auth.logout()" style="width:100%; margin-top: 12px;"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </aside>

    <main class="main-content">
        <div class="topbar">
            <button type="button" class="sidebar-toggle" onclick="toggleSidebar()" title="Toggle sidebar"><i class="fas fa-bars"></i></button>
            <h2>All Bookings</h2>
        </div>

        <div class="content-area">
            <div class="card" style="margin-bottom: 24px;">
                <div class="card-body" style="display: flex; gap: 12px; flex-wrap: wrap; align-items: center;">
                    <div class="tab-nav">
                        <button class="tab-btn active" onclick="filterBookings('ALL', this)">All</button>
                        <button class="tab-btn" onclick="filterBookings('PENDING', this)">Pending</button>
                        <button class="tab-btn" onclick="filterBookings('CONFIRMED', this)">Confirmed</button>
                        <button class="tab-btn" onclick="filterBookings('COMPLETED', this)">Completed</button>
                        <button class="tab-btn" onclick="filterBookings('CANCELLED', this)">Cancelled</button>
                        <button class="tab-btn" onclick="filterBookings('REJECTED', this)">Rejected</button>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Service</th>
                                    <th>Customer</th>
                                    <th>Provider</th>
                                    <th>Date</th>
                                    <th>Status</th>
                                    <th>Address</th>
                                </tr>
                            </thead>
                            <tbody id="bookingsTable">
                                <tr><td colspan="7" style="text-align:center; color:var(--text-muted);">Loading...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/app.js"></script>
    <script>
        Auth.requireAuth('ADMIN');
        const user = Auth.getUser();
        document.getElementById('userName').textContent = user.fullName || 'Admin';
        document.getElementById('userAvatar').textContent = Auth.getInitials();

        let allBookings = [];
        let currentFilter = 'ALL';

        async function loadBookings() {
            try {
                const response = await ApiService.getAdminBookings();
                allBookings = response.data || [];
                renderBookings();
            } catch (e) {
                document.getElementById('bookingsTable').innerHTML =
                    '<tr><td colspan="7" style="text-align:center; color:var(--text-muted);">Failed to load bookings</td></tr>';
            }
        }

        function filterBookings(status, btn) {
            currentFilter = status;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderBookings();
        }

        function renderBookings() {
            const filtered = currentFilter === 'ALL' ? allBookings : allBookings.filter(b => b.status === currentFilter);
            const tbody = document.getElementById('bookingsTable');

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:var(--text-muted);">No bookings found</td></tr>';
                return;
            }

            tbody.innerHTML = filtered.map(b => `
                <tr>
                    <td>#${b.id}</td>
                    <td><strong>${(b.service && b.service.title) || 'Service'}</strong></td>
                    <td>${(b.user && b.user.fullName) || '-'}</td>
                    <td>${(b.provider && b.provider.businessName) || '-'}</td>
                    <td>${formatDate(b.bookingDate || b.createdAt)}</td>
                    <td>${getStatusBadge(b.status)}</td>
                    <td>${b.address || '-'}</td>
                </tr>
            `).join('');
        }

        loadBookings();
    </script>
</body>
</html>
