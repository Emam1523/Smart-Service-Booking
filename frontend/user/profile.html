<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - SmartService</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo"><div class="icon">SS</div><span>SmartService</span></div>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Dashboard</span></a>
            <a href="browse.html" class="nav-item"><i class="fas fa-search"></i><span>Browse Services</span></a>
            <a href="bookings.html" class="nav-item"><i class="fas fa-calendar"></i><span>My Bookings</span></a>
            <a href="profile.html" class="nav-item active"><i class="fas fa-user"></i><span>Profile</span></a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="avatar" id="userAvatar">U</div>
                <div class="user-details"><span class="name" id="userName">User</span><span class="role">Customer</span></div>
            </div>
            <button class="btn btn-sm btn-danger" onclick="Auth.logout()" style="width:100%; margin-top: 12px;"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </aside>

    <main class="main-content">
        <div class="topbar">
            <button type="button" class="sidebar-toggle" onclick="toggleSidebar()" title="Toggle Sidebar"><i class="fas fa-bars"></i></button>
            <h2>My Profile</h2>
        </div>

        <div class="content-area">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
                <!-- Profile Info -->
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-user-edit"></i> Profile Information</h3>
                    </div>
                    <div class="card-body">
                        <form id="profileForm">
                            <div class="form-group">
                                <label>Full Name</label>
                                <input type="text" id="fullName" class="form-control" placeholder="Enter your full name" required>
                            </div>
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" id="email" class="form-control" placeholder="Your email address" disabled>
                            </div>
                            <div class="form-group">
                                <label>Phone</label>
                                <input type="tel" id="phone" class="form-control" placeholder="Enter your phone number">
                            </div>
                            <div class="form-group">
                                <label>Address</label>
                                <input type="text" id="address" class="form-control" placeholder="Enter your address">
                            </div>
                            <button type="submit" class="btn btn-primary" id="saveProfileBtn">
                                <i class="fas fa-save"></i> Save Changes
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Change Password -->
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-lock"></i> Change Password</h3>
                    </div>
                    <div class="card-body">
                        <form id="passwordForm">
                            <div class="form-group">
                                <label>Current Password</label>
                                <input type="password" id="currentPassword" class="form-control" placeholder="Enter current password" required>
                            </div>
                            <div class="form-group">
                                <label>New Password</label>
                                <input type="password" id="newPassword" class="form-control" placeholder="Enter new password" required minlength="6">
                            </div>
                            <div class="form-group">
                                <label>Confirm New Password</label>
                                <input type="password" id="confirmNewPassword" class="form-control" placeholder="Confirm new password" required>
                            </div>
                            <button type="submit" class="btn btn-primary" id="changePassBtn">
                                <i class="fas fa-key"></i> Update Password
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/app.js"></script>
    <script>
        Auth.requireAuth('USER');
        const user = Auth.getUser();
        document.getElementById('userName').textContent = user.fullName || 'User';
        document.getElementById('userAvatar').textContent = Auth.getInitials();

        async function loadProfile() {
            try {
                const response = await ApiService.getProfile();
                const profile = response.data || response;
                document.getElementById('fullName').value = profile.fullName || '';
                document.getElementById('email').value = profile.email || '';
                document.getElementById('phone').value = profile.phone || '';
                document.getElementById('address').value = profile.address || '';
            } catch (e) {
                showToast('Failed to load profile', 'error');
            }
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveProfileBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
            try {
                await ApiService.updateProfile({
                    fullName: document.getElementById('fullName').value,
                    phone: document.getElementById('phone').value,
                    address: document.getElementById('address').value
                });
                const stored = JSON.parse(localStorage.getItem('user') || '{}');
                stored.fullName = document.getElementById('fullName').value;
                localStorage.setItem('user', JSON.stringify(stored));
                document.getElementById('userName').textContent = stored.fullName;
                showToast('Profile updated!', 'success');
            } catch (e) {
                showToast(e.message || 'Failed to update profile', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save"></i> Save Changes';
            }
        });

        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPass = document.getElementById('newPassword').value;
            if (newPass !== document.getElementById('confirmNewPassword').value) {
                showToast('Passwords do not match', 'error');
                return;
            }
            const btn = document.getElementById('changePassBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';
            try {
                await ApiService.changePassword(
                    document.getElementById('currentPassword').value,
                    newPass
                );
                showToast('Password updated successfully!', 'success');
                document.getElementById('passwordForm').reset();
            } catch (e) {
                showToast(e.message || 'Failed to change password', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-key"></i> Update Password';
            }
        });

        loadProfile();
    </script>
</body>
</html>
